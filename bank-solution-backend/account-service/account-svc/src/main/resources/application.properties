server.port=5002
spring.application.name=account-svc

# Swagger/OpenAPI configuration
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.show-actuator=true

# Database config
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/account_service_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:default}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

# OpenFeign configuration
spring.cloud.openfeign.client.config.default.loggerLevel=BASIC
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.client.config.default.connectTimeout=5000

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Server configuration for containerized environments
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

integration.customer-service.url=${CUSTOMER_SERVICE_URL:http://localhost:5001/api/v1/customers}

# Kafka configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.schema-registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}
spring.kafka.consumer.group-id=account-service-group

# Kafka Topics
spring.kafka.topics.incoming.account-charge-requested=account.charge.requested
spring.kafka.topics.outgoing.account-charge-completed=account.charge.completed

# Simulation
simulation.balance.seed-enabled=${SIMULATION_BALANCE_SEED_ENABLED:false}
simulation.balance.seed-amount=${SIMULATION_BALANCE_SEED_AMOUNT:1000000.00}

# ── Distributed tracing (OpenTelemetry -> OTLP -> Jaeger) ──
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.export.otlp.endpoint=${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=false
management.logging.export.otlp.enabled=false
