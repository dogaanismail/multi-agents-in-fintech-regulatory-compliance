spring.application.name=payment-history-service
server.port=5005

# Database Configuration
spring.datasource.url=${DB_SERVICE_URL:jdbc:postgresql://localhost:5433/payment_history_db}
spring.datasource.username=${DB_SERVICE_USERNAME:default}
spring.datasource.password=${DB_SERVICE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Pagination Configuration
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.schema-registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}
spring.kafka.consumer.group-id=payment-history-group

# Kafka Topics
spring.kafka.topics.incoming.payment-snapshot-events=payment-snapshot-events

# Actuator Endpoints
springdoc.show-actuator=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Server Configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Distributed tracing (OpenTelemetry -> OTLP -> Jaeger) ──
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.export.otlp.endpoint=${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=false
management.logging.export.otlp.enabled=false
