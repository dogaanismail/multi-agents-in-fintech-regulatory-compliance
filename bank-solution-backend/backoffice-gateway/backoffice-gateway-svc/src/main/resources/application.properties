server.port=3030

spring.application.name=backoffice-gateway-service

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.show-actuator=true

spring.threads.virtual.enabled=true
spring.cloud.gateway.server.webflux.enabled=true

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=${CORS_ORIGINS:http://localhost:3000}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true

spring.cloud.gateway.server.webflux.routes[0].id=customer-service
spring.cloud.gateway.server.webflux.routes[0].uri=${CUSTOMER_SERVICE_URL:http://localhost:5001}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/customers/**

spring.cloud.gateway.server.webflux.routes[1].id=account-service
spring.cloud.gateway.server.webflux.routes[1].uri=${ACCOUNT_SERVICE_URL:http://localhost:5002}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/accounts/**

spring.cloud.gateway.server.webflux.routes[2].id=payment-service
spring.cloud.gateway.server.webflux.routes[2].uri=${PAYMENT_SERVICE_URL:http://localhost:5003}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/payments/**,/api/v1/exchange-rates/**

spring.cloud.gateway.server.webflux.routes[3].id=payment-engine-service
spring.cloud.gateway.server.webflux.routes[3].uri=${PAYMENT_ENGINE_SERVICE_URL:http://localhost:5004}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/payment-engine/**

spring.cloud.gateway.server.webflux.routes[4].id=payment-history-service
spring.cloud.gateway.server.webflux.routes[4].uri=${PAYMENT_HISTORY_SERVICE_URL:http://localhost:5005}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/payment-history/**

spring.cloud.gateway.server.webflux.routes[5].id=risk-engine-service
spring.cloud.gateway.server.webflux.routes[5].uri=${RISK_ENGINE_SERVICE_URL:http://localhost:5006}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v1/risk/**

spring.cloud.gateway.server.webflux.routes[6].id=network-topology-service
spring.cloud.gateway.server.webflux.routes[6].uri=${NETWORK_TOPOLOGY_SERVICE_URL:http://localhost:5007}
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/networks/**

spring.cloud.gateway.server.webflux.routes[7].id=customer-profile-service
spring.cloud.gateway.server.webflux.routes[7].uri=${CUSTOMER_PROFILE_SERVICE_URL:http://localhost:5008}
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/customer-profiles/**

spring.cloud.gateway.server.webflux.routes[8].id=configuration-service
spring.cloud.gateway.server.webflux.routes[8].uri=${CONFIGURATION_SERVICE_URL:http://localhost:5009}
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/v1/configurations/**

spring.cloud.gateway.server.webflux.routes[9].id=marl-orchestrator
spring.cloud.gateway.server.webflux.routes[9].uri=${MARL_ORCHESTRATOR_URL:http://localhost:1004}
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/v1/marl/**
spring.cloud.gateway.server.webflux.routes[9].filters[0]=RewritePath=/api/v1/marl/(?<segment>.*),/api/v1/$\{segment}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s