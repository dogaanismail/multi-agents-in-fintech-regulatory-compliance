server.port=5003
spring.application.name=payment-svc

# Swagger/OpenAPI configuration
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.show-actuator=true

# Database config
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/payment_service_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:default}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Server configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Kafka configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.schema-registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

# Kafka Topics
spring.kafka.topics.outgoing.payment-created=payment-created-events

integration.account-service.url=${ACCOUNT_SERVICE_URL:http://localhost:5002/api/v1/accounts}

integration.exchange-rate-api.base-url=${EXCHANGE_RATE_API_BASE_URL:https://api.exchangerate-api.com/v4/latest}

# Currency conversion scheduler interval in milliseconds (default: 1 hour)
app.exchange-rate.scheduler.interval-ms=${EXCHANGE_RATE_SCHEDULER_INTERVAL_MS:3600000}


# ── Distributed tracing (OpenTelemetry -> OTLP -> Jaeger) ──
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.opentelemetry.tracing.export.otlp.endpoint=${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
# Only traces are exported over OTLP. Metrics go to Prometheus; logs go to Loki via Alloy.
management.otlp.metrics.export.enabled=false
management.logging.export.otlp.enabled=false
