version: '3.8'

services:
  # PostgreSQL Database - Single instance for all microservices
  bank-solution-postgres:
    image: postgres:16.2
    container_name: bank-solution-postgres
    environment:
      POSTGRES_USER: default
      POSTGRES_PASSWORD: default
      POSTGRES_MULTIPLE_DATABASES: customer_service_db,payment_service_db,account_service_db,risk_engine_db,network_topology_db,payment_history_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U default"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Customer Service Database Migration
  customer-db-migration:
    image: customer-svc-db-migration-app:latest
    container_name: customer-svc-db-migration-service
    build:
      context: ./customer-service/customer-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/customer_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Customer Service
  customer-service:
    image: customer-svc-api:latest
    container_name: customer-svc-app
    build:
      context: ./customer-service/customer-svc
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/customer_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      MANAGEMENT_SERVER_PORT: 5001
    depends_on:
      customer-db-migration:
        condition: service_completed_successfully
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Account Service Database Migration
  account-db-migration:
    image: account-svc-db-migration-app:latest
    container_name: account-svc-db-migration-service
    build:
      context: ./account-service/account-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/account_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Account Service
  account-service:
    image: account-svc-api:latest
    container_name: account-svc-app
    build:
      context: ./account-service/account-svc
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/account_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CUSTOMER_SERVICE_URL: http://customer-service:5001/api/v1/customers
    depends_on:
      account-db-migration:
        condition: service_completed_successfully
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  bank-network:
    driver: bridge
  aml-network:
    external: true
    name: aml-network
