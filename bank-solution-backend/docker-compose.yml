services:
  # PostgreSQL Database - Single instance for all microservices
  bank-solution-postgres:
    image: postgres:16.2
    container_name: bank-solution-postgres
    environment:
      POSTGRES_USER: default
      POSTGRES_PASSWORD: default
      POSTGRES_MULTIPLE_DATABASES: customer_service_db,payment_service_db,account_service_db,risk_engine_db,network_topology_db,payment_history_db,payment_engine_db,customer_profile_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - bank-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U default" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Customer Service Database Migration
  customer-db-migration:
    image: customer-svc-db-migration-app:latest
    container_name: customer-svc-db-migration-service
    build:
      context: ./customer-service/customer-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/customer_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Customer Service
  customer-service:
    image: customer-svc-api:latest
    container_name: customer-svc-app
    build:
      context: ./customer-service/customer-svc
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/customer_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: 5001
    depends_on:
      customer-db-migration:
        condition: service_completed_successfully
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Account Service Database Migration
  account-db-migration:
    image: account-svc-db-migration-app:latest
    container_name: account-svc-db-migration-service
    build:
      context: ./account-service/account-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/account_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Account Service
  account-service:
    image: account-svc-api:latest
    container_name: account-svc-app
    build:
      context: ./account-service/account-svc
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/account_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CUSTOMER_SERVICE_URL: http://customer-service:5001/api/v1/customers
      SERVER_PORT: 5002
    depends_on:
      account-db-migration:
        condition: service_completed_successfully
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5002/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Payment Service Database Migration
  payment-db-migration:
    image: payment-svc-db-migration-app:latest
    container_name: payment-svc-db-migration-service
    build:
      context: ./payment-service/payment-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/payment_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Payment Service
  payment-service:
    image: payment-svc-api:latest
    container_name: payment-svc-app
    build:
      context: ./payment-service/payment-svc
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/payment_service_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 5003
    depends_on:
      payment-db-migration:
        condition: service_completed_successfully
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5003/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Payment Engine Service
  payment-engine-service:
    image: payment-engine-svc-api:latest
    container_name: payment-engine-svc-app
    build:
      context: ./payment-engine-service/payment-engine-svc
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      DB_SERVICE_URL: jdbc:postgresql://bank-solution-postgres:5432/payment_engine_db
      DB_SERVICE_USERNAME: default
      DB_SERVICE_PASSWORD: default
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 5004
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5004/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Risk Engine Database Migration
  risk-db-migration:
    image: risk-svc-db-migration-app:latest
    container_name: risk-svc-db-migration-service
    build:
      context: ./risk-engine-service/risk-engine-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/risk_engine_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Risk Engine Service
  risk-engine-service:
    image: risk-engine-svc-api:latest
    container_name: risk-engine-svc-app
    build:
      context: ./risk-engine-service/risk-engine-svc
      dockerfile: Dockerfile
    ports:
      - "5006:5006"
    environment:
      DB_SERVICE_URL: jdbc:postgresql://bank-solution-postgres:5432/risk_engine_db
      DB_SERVICE_USERNAME: default
      DB_SERVICE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ACCOUNT_SERVICE_URL: http://account-service:5002/api/v1/accounts
      NETWORK_TOPOLOGY_SERVICE_URL: http://network-topology-svc:5007/api/v1/networks
      CUSTOMER_PROFILE_SERVICE_URL: http://customer-profile-svc:5008/api/v1/customer-profiles
      SERVER_PORT: 5006
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5006/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Neo4j
  neo4j:
    image: neo4j:5.26.0-enterprise
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["graph-data-science"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Network Topology Service
  network-topology-svc:
    build:
      context: ./network-topology-service/network-topology-svc
      dockerfile: Dockerfile
    container_name: network-topology-svc
    ports:
      - "5007:5007"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - bank-network
      - aml-network

  # Customer Profile Database Migration
  customer-profile-db-migration:
    image: customer-profile-svc-db-migration-app:latest
    container_name: customer-profile-svc-db-migration-service
    build:
      context: ./customer-profile-service/customer-profile-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/customer_profile_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Customer Profile Service
  customer-profile-svc:
    image: customer-profile-svc-api:latest
    container_name: customer-profile-svc-app
    build:
      context: ./customer-profile-service/customer-profile-svc
      dockerfile: Dockerfile
    ports:
      - "5008:5008"
    environment:
      DB_SERVICE_URL: jdbc:postgresql://bank-solution-postgres:5432/customer_profile_db
      DB_SERVICE_USERNAME: default
      DB_SERVICE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 5008
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5008/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Payment History Service Database Migration
  payment-history-db-migration:
    image: payment-history-svc-db-migration-app:latest
    container_name: payment-history-svc-db-migration-service
    build:
      context: ./payment-history-service/payment-history-svc-db-migration
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bank-solution-postgres:5432/payment_history_db
      SPRING_DATASOURCE_USERNAME: default
      SPRING_DATASOURCE_PASSWORD: default
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      bank-solution-postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure

  # Payment History Service
  payment-history-service:
    image: payment-history-svc-api:latest
    container_name: payment-history-svc-app
    build:
      context: ./payment-history-service/payment-history-svc
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    environment:
      DB_SERVICE_URL: jdbc:postgresql://bank-solution-postgres:5432/payment_history_db
      DB_SERVICE_USERNAME: default
      DB_SERVICE_PASSWORD: default
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 5005
    depends_on:
      payment-history-db-migration:
        condition: service_completed_successfully
    networks:
      - bank-network
      - aml-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5005/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local

networks:
  bank-network:
    driver: bridge
  aml-network:
    external: true
    name: avro-schema-library_default
