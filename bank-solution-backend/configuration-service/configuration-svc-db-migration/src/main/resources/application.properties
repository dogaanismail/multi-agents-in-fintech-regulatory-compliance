management.server.port=6019
spring.application.name=configuration-svc-db-migration

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db.changelog-master.xml

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/configuration_service_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:default}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

spring.lifecycle.timeout-per-shutdown-phase=30s
