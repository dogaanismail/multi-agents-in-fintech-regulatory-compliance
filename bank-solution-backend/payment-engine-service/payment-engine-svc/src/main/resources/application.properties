spring.application.name=payment-engine-service
server.port=5004

spring.datasource.url=${DB_SERVICE_URL:jdbc:postgresql://localhost:5433/payment_engine_db}
spring.datasource.username=${DB_SERVICE_USERNAME:default}
spring.datasource.password=${DB_SERVICE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

# Axon Framework auto-creates event store tables
# No JPA entities - pure event sourcing with Axon

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.schema-registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}
spring.kafka.consumer.group-id=payment-engine-group

# Kafka Topics - Pure Snapshot Architecture
# Incoming events
kafka.topics.payment-created=payment-created-events
kafka.topics.risk-check-response=risk.check.response

# Outgoing events
kafka.topics.risk-check-request=risk.check.request
kafka.topics.payment-snapshot-events=payment-snapshot-events

axon.axonserver.enabled=false
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

springdoc.show-actuator=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
