spring.application.name=payment-engine-svc
server.port=5004

spring.datasource.url=${DB_SERVICE_URL:jdbc:postgresql://localhost:5433/payment_engine_db}
spring.datasource.username=${DB_SERVICE_USERNAME:default}
spring.datasource.password=${DB_SERVICE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase config
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db.changelog-master.xml

db-scheduler.enabled=true

# Axon Framework auto-creates event store tables
# No JPA entities - pure event sourcing with Axon
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.banksolution.config.ByteaEnforcedPostgreSQLDialect
spring.jpa.database-platform=org.banksolution.config.ByteaEnforcedPostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Enable Axon's Spring transaction manager integration
axon.axonserver.enabled=false
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

axon.tracing.show-event-sourcing-handlers=true
axon.tracing.snapshotter.separate-trace=true

# Enable saga debugging
logging.level.org.axonframework.modelling.saga=DEBUG
logging.level.org.banksolution.domain.payment.saga=DEBUG
logging.level.org.axonframework.updates=ERROR

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.schema-registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}
spring.kafka.consumer.group-id=payment-engine-group

# Axon Kafka Configuration
axon.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
axon.kafka.client-id=payment-engine-axon
axon.kafka.default-topic=payment-domain-events
axon.kafka.properties.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

# Axon Kafka Producer
axon.kafka.producer.transaction-id-prefix=payment-engine-tx-

# Axon Kafka Consumer (if needed)
axon.kafka.consumer.event-processor-mode=subscribing
axon.kafka.fetcher.poll-timeout=3000

# Kafka Topics - Pure Snapshot Architecture
# Incoming topics
spring.kafka.topics.incoming.payment-created=payment-created-events
spring.kafka.topics.incoming.risk-assessment-completed=risk.assessment.completed
spring.kafka.topics.incoming.account-charge-completed=account.charge.completed

# Outgoing topics
spring.kafka.topics.outgoing.risk-assessment-requested=risk.assessment.requested
spring.kafka.topics.outgoing.payment-snapshot-events=payment-snapshot-events
spring.kafka.topics.outgoing.account-charge-requested=account.charge.requested

springdoc.show-actuator=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
