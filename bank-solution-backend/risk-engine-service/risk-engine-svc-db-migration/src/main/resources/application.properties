management.server.port=7008
spring.application.name=risk-engine-svc-db-migration

# Liquibase config
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db.changelog-master.xml

# Database config
spring.datasource.url=${DB_SERVICE_URL:jdbc:postgresql://localhost:5433/payment_history_db}
spring.datasource.username=${DB_SERVICE_USERNAME:default}
spring.datasource.password=${DB_SERVICE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Server configuration for containerized environments
spring.lifecycle.timeout-per-shutdown-phase=30s