version: '3.8'

services:

  transaction-pattern-agent:
    build:
      context: agents/transaction_pattern_agent
      dockerfile: Dockerfile
    container_name: transaction-pattern-agent
    ports:
      - "8001:8001"
    environment:
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  customer-risk-agent:
    build:
      context: agents/customer_risk_agent
      dockerfile: Dockerfile
    container_name: customer-risk-agent
    ports:
      - "8002:8002"
    environment:
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  network-analysis-agent:
    build:
      context: agents/network_analysis_agent
      dockerfile: Dockerfile
    container_name: network-analysis-agent
    ports:
      - "8003:8003"
    environment:
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  marl-orchestrator:
    build:
      context: marl_orchestrator
      dockerfile: Dockerfile
    container_name: marl-orchestrator
    ports:
      - "8004:8004"
    environment:
      - MADDPG_MODE=inference
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
      - TRANSACTION_AGENT_URL=http://transaction-pattern-agent:8001
      - CUSTOMER_AGENT_URL=http://customer-risk-agent:8002
      - NETWORK_AGENT_URL=http://network-analysis-agent:8003
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    depends_on:
      - transaction-pattern-agent
      - customer-risk-agent
      - network-analysis-agent
    networks:
      - aml-multi-agent-network
      - aml-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  aml-multi-agent-network:
    name: aml-multi-agent-network
    driver: bridge
  aml-network:
    external: true
    name: aml-network
