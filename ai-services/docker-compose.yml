services:

  marl-orchestrator-db:
    image: postgres:16-alpine
    container_name: marl-orchestrator-db
    environment:
      POSTGRES_DB: marl_orchestrator_db
      POSTGRES_USER: marl_user
      POSTGRES_PASSWORD: marl_password
    ports:
      - "5438:5432"
    volumes:
      - marl_orchestrator_db_data:/var/lib/postgresql/data
    networks:
      - aml-multi-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marl_user -d marl_orchestrator_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction-pattern-agent:
    build:
      context: agents/transaction_pattern_agent
      dockerfile: Dockerfile
    container_name: transaction-pattern-agent
    ports:
      - "1001:1001"
    environment:
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
      - PORT=1001
    networks:
      - aml-multi-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  customer-risk-agent:
    build:
      context: agents/customer_risk_agent
      dockerfile: Dockerfile
    container_name: customer-risk-agent
    ports:
      - "1002:1002"
    environment:
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
      - PORT=1002
    networks:
      - aml-multi-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  network-analysis-agent:
    build:
      context: agents/network_analysis_agent
      dockerfile: Dockerfile
    container_name: network-analysis-agent
    ports:
      - "1003:1003"
    environment:
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
      - PORT=1003
    networks:
      - aml-multi-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  marl-orchestrator:
    build:
      context: marl_orchestrator
      dockerfile: Dockerfile
    container_name: marl-orchestrator
    ports:
      - "1004:1004"
    environment:
      - MADDPG_MODE=inference
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=info
      - PORT=1004
      - TRANSACTION_AGENT_URL=http://transaction-pattern-agent:1001
      - CUSTOMER_AGENT_URL=http://customer-risk-agent:1002
      - NETWORK_AGENT_URL=http://network-analysis-agent:1003
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - DATABASE_URL=postgresql+asyncpg://marl_user:marl_password@marl-orchestrator-db:5432/marl_orchestrator_db
      - TRAINING_INTERVAL_SECONDS=30
      - MIN_EXPERIENCES_FOR_TRAINING=1
      - TRAINING_BATCH_SIZE=1
    depends_on:
      marl-orchestrator-db:
        condition: service_healthy
      transaction-pattern-agent:
        condition: service_started
      customer-risk-agent:
        condition: service_started
      network-analysis-agent:
        condition: service_started
    volumes:
      - marl_trained_models:/app/trained_models
    networks:
      - aml-multi-agent-network
      - aml-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1004/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  aml-multi-agent-network:
    name: aml-multi-agent-network
    driver: bridge
  aml-network:
    external: true
    name: avro-schema-library_default

volumes:
  marl_orchestrator_db_data:
    name: marl_orchestrator_db_data
  marl_trained_models:
    name: marl_trained_models
