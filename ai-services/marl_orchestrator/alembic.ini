# Alembic configuration for MARL Orchestrator (async PostgreSQL)
#
# Usage:
#   Apply migrations:  alembic upgrade head
#   Create migration:  alembic revision --autogenerate -m "description"
#   Rollback one:      alembic downgrade -1
#   View history:      alembic history
#
# NOTE: If tables already exist (created via init_db / create_all),
#       mark the current state without re-running: alembic stamp head

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Overridden by DATABASE_URL env var in migrations/env.py
sqlalchemy.url = postgresql+asyncpg://marl_user:marl_password@localhost:5438/marl_orchestrator_db

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
